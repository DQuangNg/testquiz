<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Quiz Từ Vựng Tokuteigino</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#eef2f7;
    padding:40px;
}

/* MENU */
#menu{
    width:800px;
    margin:auto;
}

.menuBtn{
    background:#1e88e5;
    color:white;
    font-size:22px;
    margin:10px 0;
}

.menuBtn:hover{
    background:#1565c0;
}

/* CARD */
.card{
    background:white;
    padding:50px;
    border-radius:25px;
    width:800px;
    margin:auto;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    display:none;
    position:relative;   
}

h2{
    font-size:32px;
    margin-bottom:25px;
}

.kanji{
    font-size:70px;
    margin:30px 0;
    font-weight:bold;
}

button{
    width:100%;
    padding:18px;
    margin:15px 0;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.correct{
    background:#4CAF50;
    color:white;
}

.wrong{
    background:#f44336;
    color:white;
}

.nextBtn{
    background:#4a89dc;
    color:white;
    font-size:22px;
}

.backBtn{
    position:absolute;
    top:15px;
    left:15px;
    width:auto;
    padding:8px 14px;
    font-size:14px;
    border-radius:8px;
    background:#ff9800;
    color:white;
}

/* SCORE */
#score{
    font-size:22px;
    margin-top:20px;
}

/* SUMMARY */
#summaryContainer{
    max-height:400px;
    overflow-y:auto;
    margin-top:20px;
    border:1px solid #ccc;
    border-radius:12px;
    background:#fafafa;
    padding:5px;
}

#summaryContainer::-webkit-scrollbar{
    width:8px;
}

#summaryContainer::-webkit-scrollbar-thumb{
    background:#4a89dc;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:16px;
}

th, td{
    padding:10px;
    border:1px solid #ccc;
    text-align:center;
}

th{
    background:#4a89dc;
    color:white;
    position:sticky;
    top:0;
}
.speak-btn{
    font-size:20px;
    margin-left:10px;
    cursor:pointer;
    border:none;
    background:none;
}

.speak-btn:hover{
    transform:scale(1.2);
}
</style>
</head>

<body>

<div id="menu"></div>

<div class="card">
    <h2>Quiz Từ Vựng</h2>

    <button class="backBtn" onclick="goBack()">←</button>

    <div class="kanji" id="question"></div>

    <span id="kanjiText"></span>
    <button onclick="speakWord()" class="speak-btn">🔊</button>
</div>
    <div id="answers"></div>

    <button class="nextBtn">Câu tiếp</button>

    <p id="score"></p>
    <div id="summaryContainer"></div>
</div>

/* ===== CONFIG ===== */
const setSize = 50;

let questions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let results = [];

const nextBtn = document.querySelector(".nextBtn");
const card = document.querySelector(".card");
const menu = document.getElementById("menu");

/* ===== SHUFFLE SAFE ===== */
function shuffle(array){
    return [...array].sort(()=>Math.random()-0.5);
}

/* ===== MENU ===== */
function createMenu(){

    let totalSets = Math.ceil(allData.length / setSize);
    let html = "<h2>CHỌN BỘ TỪ VỰNG NHÉ !!!</h2>";

    for(let i=0;i<totalSets;i++){

        let start = i * setSize + 1;
        let end = Math.min((i+1)*setSize, allData.length);

        html += `<button class="menuBtn" onclick="selectSet(${i})">
                    Bộ ${i+1} (${start} - ${end})
                 </button>`;
    }

    menu.innerHTML = html;
}

/* ===== SELECT SET ===== */
function selectSet(setIndex){

    menu.style.display="none";
    card.style.display="block";

    let start = setIndex * setSize;
    let end = Math.min(start + setSize, allData.length);

    questions = shuffle(allData.slice(start, end));

    currentIndex = 0;
    score = 0;
    answered = false;
    results = [];

    nextBtn.innerText="Câu tiếp";
    nextBtn.disabled=true;

    document.getElementById("score").innerText="";
    document.getElementById("summaryContainer").innerHTML="";

    showQuestion();
}

/* ===== SHOW QUESTION ===== */
function showQuestion(){

    answered = false;
    nextBtn.disabled = true;

    let current = questions[currentIndex];

    document.getElementById("question").innerText = current.kanji;
    document.getElementById("answers").innerHTML="";

    let options=[current];

    while(options.length<3 && questions.length>1){
        let random = questions[Math.floor(Math.random()*questions.length)];
        if(!options.includes(random)){
            options.push(random);
        }
    }

    options = shuffle(options);

    options.forEach(option=>{

        let btn=document.createElement("button");
        btn.innerHTML=option.hira+" - "+option.viet;

        btn.onclick=function(){

            if(answered) return;

            answered=true;
            nextBtn.disabled=false;

            let buttons=document.querySelectorAll("#answers button");
            buttons.forEach(b=>b.disabled=true);

            let correctText=current.hira+" - "+current.viet;
            let isCorrect = option===current;

            buttons.forEach(b=>{
                if(b.innerHTML===correctText){
                    b.classList.add("correct");
                }
            });

            if(!isCorrect){
                btn.classList.add("wrong");
            }else{
                score++;
            }

            results.push({
                kanji: current.kanji,
                correct: correctText,
                selected: option.hira+" - "+option.viet,
                status: isCorrect ? "Đúng" : "Sai"
            });

            document.getElementById("score").innerText=
                `Điểm: ${score} | Câu ${currentIndex+1}/${questions.length}`;
        };

        document.getElementById("answers").appendChild(btn);
    });
}

/* ===== SHOW SUMMARY ===== */
function showSummary(){

    let html = `
        <table>
            <tr>
                <th>Kanji</th>
                <th>Đáp án đúng</th>
                <th>Bạn chọn</th>
                <th>Kết quả</th>
            </tr>
    `;

    results.forEach(r=>{
        html += `
            <tr>
                <td>${r.kanji}</td>
                <td>${r.correct}</td>
                <td>${r.selected}</td>
                <td>${r.status}</td>
            </tr>
        `;
    });

    html += "</table>";

    document.getElementById("summaryContainer").innerHTML = html;
}

/* ===== NEXT BUTTON ===== */
nextBtn.onclick=function(){

    if(nextBtn.innerText==="🔄 Chơi lại"){
        card.style.display="none";
        menu.style.display="block";
        return;
    }

    currentIndex++;

    if(currentIndex>=questions.length){

        document.getElementById("question").innerText="🎉 Hoàn thành!";
        document.getElementById("answers").innerHTML="";
        document.getElementById("score").innerText=
            `Tổng điểm: ${score} / ${questions.length}`;

        showSummary();

        nextBtn.innerText="🔄 Chơi lại";
        nextBtn.disabled=false;

    }else{
        showQuestion();
    }
};

/* ===== BACK ===== */
function goBack(){

    if(confirm("Bạn có muốn dừng bài hiện tại không?")){
        card.style.display="none";
        menu.style.display="block";

        document.getElementById("summaryContainer").innerHTML="";
        document.getElementById("answers").innerHTML="";
        document.getElementById("question").innerText="";
        document.getElementById("score").innerText="";
    }
}
/* ===== SPEECH MOBILE FIX ===== */

let voices = [];
let voiceLoaded = false;

// Load voices khi có thay đổi
speechSynthesis.onvoiceschanged = function () {
    voices = speechSynthesis.getVoices();
    voiceLoaded = true;
};

// Bắt buộc phải kích hoạt audio bằng chạm tay trước
document.body.addEventListener("click", function initAudio() {
    speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
    document.body.removeEventListener("click", initAudio);
});

function speakWord() {

    if (!questions.length) return;

    let current = questions[currentIndex];

    speechSynthesis.cancel();

    let utter = new SpeechSynthesisUtterance(current.hira);
    utter.lang = "ja-JP";
    utter.rate = 1;

    if (voiceLoaded) {
        let jpVoice = voices.find(v => v.lang.includes("ja"));
        if (jpVoice) utter.voice = jpVoice;
    }

    speechSynthesis.speak(utter);
}
createMenu();
